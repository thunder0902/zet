<header class="site-header" id="site-header">
  <div class="container header-inner">
    <a class="brand" href="/">ZET</a>
    <nav class="nav" id="site-nav">
      <a href="/">Home</a>
      <a href="/games/">Games</a>
      <a href="https://github.com/thunder0902/zet" target="_blank" rel="noopener">GitHub</a>
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="메뉴" aria-expanded="false">☰</button>
  </div>
</header>
<script>
// improved accessible nav toggle using classes (more reliable on mobile)
(function(){
  const btn = document.getElementById('nav-toggle');
  const header = document.getElementById('site-header');
  const nav = document.getElementById('site-nav');
  if(!btn||!nav||!header) return;

  function open(){
    header.classList.add('nav-open');
    btn.setAttribute('aria-expanded','true');
  }
  function close(){
    header.classList.remove('nav-open');
    btn.setAttribute('aria-expanded','false');
  }
  btn.addEventListener('click', ()=>{
    if(header.classList.contains('nav-open')) close(); else open();
  });
  // close on resize to desktop
  function update(){
    if(window.innerWidth>720){ close(); }
  }
  window.addEventListener('resize', update);
  // close on outside click (mobile)
  document.addEventListener('click', (e)=>{
    if(window.innerWidth<=720 && header.classList.contains('nav-open')){
      if(!header.contains(e.target)) close();
    }
  });
})();
</script>
