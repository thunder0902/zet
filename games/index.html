<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ZET Games</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/">ZET</a>
    <nav class="nav" id="site-nav">
      <a href="/">Home</a>
      <a href="/games/">Games</a>
    </nav>
    <button class="nav-toggle" aria-label="메뉴">☰</button>
  </div>
</header>

  <main class="container" style="padding-top:28px">
    <h1 style="margin-top:0">게임 목록</h1>
    <p class="hero-sub">작고 어두운 실험작부터 완성형 호러까지 — 마음에 드는 게임을 골라 플레이하세요.</p>

    <section class="features" style="margin-top:18px">
      <article class="card" style="display:flex;gap:12px;align-items:center;padding:14px">
        <a href="/games/psycho-prince/" style="display:block;width:140px;flex:0 0 140px"><img src="/games/psycho-prince/assets/eyewall.png" alt="Psycho Prince" style="width:100%;height:96px;object-fit:cover;border-radius:10px"></a>
        <div>
          <h3 style="margin:0">Psycho Prince</h3>
          <div style="font-size:13px;color:var(--muted);margin:6px 0">2D 횡스크롤</div>
          <p style="margin:0;color:var(--brand);opacity:.8">픽셀 아트, 추격·플랫폼 요소. 플레이타임 약 15분.</p>
          <div style="margin-top:8px"><a class="button" href="/games/psycho-prince/">플레이</a></div>
        </div>
      </article>

      <article class="card" style="display:flex;gap:12px;align-items:center;padding:14px">
        <a href="/games/monitor-horror/" style="display:block;width:140px;flex:0 0 140px"><img src="/games/monitor-horror/assets/cover.png" alt="Monitor Horror" style="width:100%;height:96px;object-fit:cover;border-radius:10px"></a>
        <div>
          <h3 style="margin:0">모니터 너머</h3>
          <div style="font-size:13px;color:var(--muted);margin:6px 0">텍스트 어드벤처</div>
          <p style="margin:0;color:var(--brand);opacity:.8">4th-wall 메타 호러 텍스트 게임. 플레이어를 인지하는 연출 포함.</p>
          <div style="margin-top:8px"><a class="button" href="/games/monitor-horror/">플레이</a></div>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-foot">
    <div class="container">© 2026 윤코형님 — dhole.digital</div>
  </footer>
</body>
</html>
