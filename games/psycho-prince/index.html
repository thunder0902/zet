<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>사이코 프린스: 석화의 성채</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- site header -->
  <!-- include: _header.html -->
  <header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/">ZET</a>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/games/">Games</a>
      <a href="https://github.com/thunder0902/zet" target="_blank" rel="noopener">GitHub</a>
    </nav>
    <button class="nav-toggle" aria-label="메뉴">☰</button>
  </div>
</header>

  <div class="wrap">
    <header>
      <h1>사이코 프린스: 석화의 성채</h1>
      <p class="subtitle">횡스크롤 2D · 추격 · 함정 · 잔혹 사이코 스토리</p>
    </header>

    <div class="hud">
      <div>체력: <span id="hp">3</span></div>
      <div>체크포인트: <span id="cp">0</span>/4</div>
      <div>상태: <span id="state">탐색</span></div>
    </div>

    <canvas id="game" width="960" height="540"></canvas>

    <div class="panel">
      <div id="story" class="story"></div>
      <div class="controls">조작: ←→ 이동 / ↑ 점프 / ↓ 숨기 / Shift 대시 / R 재시작</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
