<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Surgeon's Static — 초현실적 심리 공포</title>
<style>
  :root{--bg:#0b0b0b;--fg:#eaeaea;--accent:#cfcfcf;--danger:#ff6b6b}
  html,body{height:100%;margin:0;background:#000;color:var(--fg);font-family:Inter, Noto Sans KR, system-ui}
  canvas{display:block;width:100vw;height:100vh;background:#000;touch-action:none}
  .ui{position:absolute;left:12px;right:12px;bottom:18px;pointer-events:none;display:flex;flex-direction:column;gap:10px;z-index:20}
  .hud{display:flex;align-items:center;gap:12px;justify-content:space-between;pointer-events:auto;background:linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.2));padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.03);backdrop-filter: blur(6px)}
  .stamina-wrap{flex:1;margin-right:12px;background:rgba(255,255,255,0.03);height:12px;border-radius:10px;overflow:hidden}
  .stamina-bar{height:100%;background:linear-gradient(90deg,#ddd,#999);width:100%}
  .label{font-size:13px;color:#cfcfcf}
  .msg{position:absolute;left:50%;top:14vh;transform:translateX(-50%);max-width:760px;background:rgba(0,0,0,0.6);padding:14px 18px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);font-size:15px;line-height:1.4;text-align:center;pointer-events:none;z-index:21}
  .hint{font-size:12px;opacity:0.8;color:#a9a9a9}
  .btn{pointer-events:auto;padding:8px 12px;border-radius:10px;background:#111;border:1px solid rgba(255,255,255,0.04);color:var(--fg);cursor:pointer}
  .corner{position:absolute;right:12px;top:12px;z-index:21;pointer-events:auto}
  .credits{font-size:12px;opacity:0.6}
  .tutorial{position:absolute;left:50%;top:60%;transform:translateX(-50%);background:rgba(0,0,0,0.7);padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);z-index:22;pointer-events:auto}
  @media (max-width:640px){.msg{font-size:13px;padding:10px}.hud{padding:8px}}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="ui" id="ui">
  <div class="hud" id="hud">
    <div style="display:flex;gap:12px;align-items:center">
      <div style="min-width:120px">
        <div class="label">눈 깜빡임 스태미나</div>
        <div class="stamina-wrap"><div id="stamina" class="stamina-bar"></div></div>
      </div>
      <div style="min-width:120px">
        <div class="label">방 시간</div>
        <div id="roomTime" style="font-weight:700">00:00</div>
      </div>
      <div style="min-width:120px">
        <div class="label">조각</div>
        <div id="shards" style="font-weight:700">0 / 5</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="hint">W/A/S/D 이동 • 마우스 회전 • Space 깜빡임</div>
    </div>
  </div>
</div>

<div class="msg" id="msg">
  <strong>외과 의사의 정적</strong>
  <div style="height:8px"></div>
  낡은 수술실. 메스가 금속을 긁는 듯한 소리와 함께 복도 끝에서 무언가 다가온다. 눈을 감지 않도록 스태미나를 관리하라. <br><br>
  목표: 기억의 조각 5개를 모아 탈출하세요.<br><br>
  <button id="startBtn" class="btn">시작하기</button>
</div>

<div id="tutorial" class="tutorial" style="display:none;">
  <div style="font-weight:700;margin-bottom:6px">튜토리얼</div>
  W/A/S/D로 이동 · Space로 깜빡임(의도적) · 중앙 근처에서 조사를 누르면 조각 획득<br>
  조각을 모으면 스태미나가 일부 회복됩니다.
  <div style="height:8px"></div>
  <button id="dismissTut" class="btn">알겠음</button>
</div>

<div class="corner">
  <div class="credits">The Surgeon's Static — 프로토타입</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });
  let W = innerWidth, H = innerHeight;
  function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  addEventListener('resize', resize); resize();

  const state = { playing:false, startTime:0, roomTime:0, stamina:100, blinkCooldown:0, blinkActive:false, staticIntensity:0, doctorDist:60, playerPos:{x:0,y:0}, roomIndex:0, rngSeed:Math.random()*1e6, audioStarted:false, shards:0 };
  const staminaEl = document.getElementById('stamina');
  const roomTimeEl = document.getElementById('roomTime');
  const shardsEl = document.getElementById('shards');
  const msg = document.getElementById('msg');
  const startBtn = document.getElementById('startBtn');
  const tut = document.getElementById('tutorial');
  const dismissTut = document.getElementById('dismissTut');

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function lerp(a,b,t){ return a + (b-a)*t; }
  function rand(){ state.rngSeed = (state.rngSeed*9301+49297)%233280; return state.rngSeed/233280; }

  const keys = {};
  addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.key===' '){ e.preventDefault(); blink(); }});
  addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

  canvas.addEventListener('mousedown', e => { canvas.requestPointerLock?.(); });
  document.addEventListener('pointerlockchange', ()=>{});
  document.addEventListener('mousemove', ()=>{});

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx, masterGain, heartbeatGain, noiseNode, metalNode, staticGainNode;
  function initAudio(){ if(audioCtx) return; audioCtx = new AudioCtx(); masterGain = audioCtx.createGain(); masterGain.gain.value = 0.9; masterGain.connect(audioCtx.destination);
    const hbOsc = audioCtx.createOscillator(); hbOsc.type='sine'; hbOsc.frequency.value=32; heartbeatGain = audioCtx.createGain(); heartbeatGain.gain.value=0; hbOsc.connect(heartbeatGain); heartbeatGain.connect(masterGain); hbOsc.start();
    const bufferSize = 2*audioCtx.sampleRate; const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const data = noiseBuffer.getChannelData(0); for(let i=0;i<bufferSize;i++) data[i]=(Math.random()*2-1)*0.18; noiseNode = audioCtx.createBufferSource(); noiseNode.buffer=noiseBuffer; noiseNode.loop=true; const bp = audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=3200; bp.Q.value=0.6; noiseNode.connect(bp); metalNode = audioCtx.createGain(); metalNode.gain.value=0; bp.connect(metalNode); metalNode.connect(masterGain); noiseNode.start(); const staticBuf = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate); const sdata = staticBuf.getChannelData(0); for(let i=0;i<bufferSize;i++) sdata[i]=(Math.random()*2-1)*0.06; const staticNode = audioCtx.createBufferSource(); staticNode.buffer=staticBuf; staticNode.loop=true; staticGainNode = audioCtx.createGain(); staticGainNode.gain.value=0; staticNode.connect(staticGainNode); staticGainNode.connect(masterGain); staticNode.start(); audioMod = { setHeartbeat:(v)=>{ heartbeatGain.gain.linearRampToValueAtTime(v*0.6, audioCtx.currentTime+0.05); hbOsc.frequency.linearRampToValueAtTime(30+v*40,audioCtx.currentTime+0.05); }, setMetal:(v)=>{ metalNode.gain.linearRampToValueAtTime(v*0.9, audioCtx.currentTime+0.05); }, setStatic:(v)=>{ staticGainNode.gain.linearRampToValueAtTime(v*0.25, audioCtx.currentTime+0.05); } };
  }
  let audioMod={setHeartbeat:()=>{}, setMetal:()=>{}, setStatic:()=>{}};
  function startAudioOnGesture(){ if(state.audioStarted) return; try{ initAudio(); state.audioStarted=true; }catch(e){}}

  // Adjusted tuning values
  const BLINK_COST = 10; // was 18 -> less punishing
  const BLINK_COOLDOWN = 0.9; // shorter cooldown
  const STAMINA_RECOVER_RATE = 0.012; // higher recovery

  function blink(){ if(state.blinkCooldown > 0.5) return; state.blinkActive=true; state.stamina = clamp(state.stamina - BLINK_COST, 0, 100); state.blinkCooldown = BLINK_COOLDOWN; blackoutTimer = 0.45; }

  const rooms = [{id:0,name:'Intro - 수술실',desc:'깨어난다. 빛과 금속 소리, 복도에서 발소리.'},{id:1,name:'회복실',desc:'냉정한 조명과 뿌연 거울.'},{id:2,name:'복도',desc:'늘어나는 그림자와 문들.'},{id:3,name:'기억의 방',desc:'기억 조각이 흩어져 있다.'},{id:4,name:'최종실',desc:'진실과 마주하는 곳.'}];

  function drawScene(dt){ const g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#070707'); g.addColorStop(0.6,'#0b0b0b'); g.addColorStop(1,'#060606'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    const vign=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2,W/2,H/2,Math.max(W,H)); vign.addColorStop(0,'rgba(0,0,0,0)'); vign.addColorStop(1,'rgba(0,0,0,0.6)'); ctx.fillStyle=vign; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.translate(W*0.5,H*0.55); ctx.fillStyle='#050505'; ctx.fillRect(-W*0.18,-12,W*0.36,24); ctx.fillRect(-W*0.05,-60,W*0.1,48); ctx.restore(); ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(W*0.5,H*0.4); ctx.lineTo(W*0.8,H*0.9); ctx.moveTo(W*0.5,H*0.4); ctx.lineTo(W*0.2,H*0.9); ctx.stroke();
    const closeness = clamp(1 - (state.doctorDist/60),0,1);
    // smooth doctor movement: lerp distance instead of snap
    state.doctorDist = lerp(state.doctorDistPrev||state.doctorDist, state.doctorDist, dt*0.004);
    state.doctorDistPrev = state.doctorDist;
    const docX = W*0.5 + Math.sin(performance.now()*0.001 + state.roomIndex)*W*0.22*closeness;
    const docY = H*0.15 + (1-closeness)*H*0.03; const scale=lerp(0.6,2.4,closeness);
    ctx.save(); ctx.translate(docX,docY); ctx.scale(scale,scale); ctx.fillStyle=`rgba(8,8,8,${0.9})`; ctx.beginPath(); ctx.ellipse(0,40,18,36,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(0,-6,18,18,0,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='rgba(200,200,200,0.65)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(18,-2); ctx.lineTo(52,-18); ctx.stroke(); ctx.restore();
    if(state.staticIntensity > 0.02){ ctx.save(); ctx.globalAlpha = clamp(state.staticIntensity*0.9,0,0.9); ctx.fillStyle = `rgba(255,255,255,${0.02 + 0.05*state.staticIntensity})`; for(let i=0;i<18;i++){ ctx.fillRect(0,(i*(H/20)+(performance.now()*0.05)%6),W,1);} ctx.restore(); }
  }

  function updateUI(){ staminaEl.style.width = state.stamina + '%'; const rt=Math.floor(state.roomTime); const mm=String(Math.floor(rt/60)).padStart(2,'0'); const ss=String(rt%60).padStart(2,'0'); roomTimeEl.textContent=`${mm}:${ss}`; shardsEl.textContent = `${state.shards} / 5`; }

  function gameplayStep(dt){ const speed=60*(dt/1000); let mv={x:0,y:0}; if(keys['w']) mv.y-=1; if(keys['s']) mv.y+=1; if(keys['a']) mv.x-=1; if(keys['d']) mv.x+=1; if(mv.x||mv.y){ const len=Math.hypot(mv.x,mv.y)||1; state.playerPos.x += (mv.x/len)*speed; state.playerPos.y += (mv.y/len)*speed; }
    if(state.blinkActive){ if(rand()<0.6){ state.doctorDist = clamp(state.doctorDist - (4 + rand()*10),1,120); } else { state.doctorDist = clamp(state.doctorDist - (2 + rand()*6),1,120); } state.staticIntensity = clamp(state.staticIntensity + 0.25 + rand()*0.12,0,1); state.blinkActive=false; }
    // gradual approach
    state.doctorDist = clamp(state.doctorDist - dt*0.0015 - (state.staticIntensity*0.0015),0.5,200);
    if(state.blinkCooldown>0) state.blinkCooldown = clamp(state.blinkCooldown - dt/1000,0,10);
    if(state.stamina<100 && state.blinkCooldown===0) state.stamina = clamp(state.stamina + dt*STAMINA_RECOVER_RATE,0,100);
    const closeness = clamp(1 - (state.doctorDist/60),0,1); state.staticIntensity = clamp(lerp(state.staticIntensity,closeness,dt*0.0025),0,1);
    audioMod.setHeartbeat(closeness); audioMod.setMetal(state.staticIntensity*0.8); audioMod.setStatic(state.staticIntensity*0.5);
    state.roomTime += dt/1000; if(rand() < dt*0.00004 + state.staticIntensity*0.0004) state.staticIntensity = clamp(state.staticIntensity + 0.06 + rand()*0.1,0,1); if(state.doctorDist < 1.2) triggerGameOver(); }

  let blackoutTimer=0;
  function render(dt){ if(blackoutTimer>0){ ctx.fillStyle='black'; ctx.fillRect(0,0,W,H); blackoutTimer = clamp(blackoutTimer - dt/1000,0,5); audioMod.setStatic(1.0); return; } drawScene(dt); ctx.save(); ctx.fillStyle = `rgba(230,230,230, ${0.8 + state.staticIntensity*0.08})`; ctx.textAlign='center'; const baseText = (state.roomIndex===0)?'복도에서 발자국 소리...':rooms[state.roomIndex].desc; let jitter = Math.floor(state.staticIntensity*12); for(let i=0;i<2;i++){ const xj=(rand()-0.5)*jitter*4; const yj=(rand()-0.5)*jitter*1.2; ctx.font = `${20 + Math.floor(state.staticIntensity*6)}px serif`; ctx.fillText(glitchText(baseText,state.staticIntensity), W/2 + xj, H*0.28 + yj); } ctx.restore(); }

  function glitchText(t,intensity){ if(intensity<0.16) return t; const arr=t.split(''); const n=Math.floor(intensity*4); for(let i=0;i<n;i++){ const idx=Math.floor(rand()*arr.length); arr[idx]=String.fromCharCode(0x2500+Math.floor(rand()*60)); } return arr.join(''); }

  let gameOverFlag=false; function triggerGameOver(){ if(gameOverFlag) return; gameOverFlag=true; msg.style.display='block'; msg.innerHTML = '<strong>발견됨</strong><div style="height:10px"></div><div>그가 당신의 기억을 삼켰다. 다시 시도하려면 새 게임을 시작하세요.</div><div style="height:12px"></div><button id="retry" class="btn">다시</button>' ; document.getElementById('retry').addEventListener('click',()=>location.reload()); audioMod.setHeartbeat(1.0); audioMod.setMetal(1.0); audioMod.setStatic(1.0); }

  let last = performance.now(); function loop(t){ const dt = t-last; last=t; if(state.playing) gameplayStep(dt); if(state.stamina<=0 && !gameOverFlag){ blackoutTimer = 0.45; state.doctorDist = clamp(state.doctorDist - (6 + rand()*18),0.2,200); state.stamina = 8; } render(dt); updateUI(); if(state.staticIntensity>0.03 && blackoutTimer<=0){ ctx.save(); ctx.globalAlpha = clamp(state.staticIntensity*0.9,0,0.9); const count = Math.floor(160 * state.staticIntensity); for(let i=0;i<count;i++){ ctx.fillStyle = `rgba(${80+Math.floor(rand()*60)},${80+Math.floor(rand()*60)},${80+Math.floor(rand()*60)},${0.02 + rand()*0.05})`; ctx.fillRect(Math.floor(rand()*W), Math.floor(rand()*H), Math.ceil(rand()*3), Math.ceil(rand()*3)); } ctx.restore(); } requestAnimationFrame(loop); }

  function start(){ startAudioOnGesture(); state.playing=true; state.startTime=performance.now(); state.roomTime=0; msg.style.display='none'; tut.style.display='block'; state.doctorDist = 38 + rand()*18; requestAnimationFrame(loop); }
  startBtn.addEventListener('click', start); dismissTut.addEventListener('click', ()=>{ tut.style.display='none'; });

  setInterval(()=>{ const closeness = clamp(1 - (state.doctorDist/60),0,1); audioMod.setHeartbeat(0.15 + closeness*0.5); }, 800);

  const pieces=[{x:12,y:5,found:false}]; function checkPieces(){ if(!pieces[0].found && state.roomTime>2 && Math.abs(state.playerPos.x)<28){ pieces[0].found=true; state.shards += 1; playPickup(); showTransient('기억의 조각을 발견했다...',2400); state.stamina = clamp(state.stamina + 26,0,100); state.doctorDist = clamp(state.doctorDist + 12,0.2,200); if(state.shards >=5){ showTransient('모든 조각을 모았습니다. 탈출구를 찾아라.',4000); } } }
  function playPickup(){ try{ if(!audioCtx) initAudio(); const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.type='sine'; o.frequency.value=880; g.gain.value=0.0001; o.connect(g); g.connect(masterGain); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.02); o.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime+0.12); setTimeout(()=>{ o.stop(); },140); }catch(e){} }

  function showTransient(text,time=2000){ const el=document.createElement('div'); el.style.position='fixed'; el.style.left='50%'; el.style.top='20%'; el.style.transform='translateX(-50%)'; el.style.background='rgba(10,10,10,0.7)'; el.style.color='#fff'; el.style.padding='10px 14px'; el.style.borderRadius='8px'; el.style.zIndex=40; el.style.fontSize='14px'; el.textContent=text; document.body.appendChild(el); setTimeout(()=>{ el.style.transition='opacity 0.5s'; el.style.opacity=0; setTimeout(()=>el.remove(),600); },time); }

  setInterval(()=>{ if(state.playing) checkPieces(); },700);

  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); ctx.fillStyle='#f0f0f0'; ctx.textAlign='center'; ctx.font='18px sans-serif'; ctx.fillText('The Surgeon\'s Static — 준비되면 시작을 누르세요', W/2, H/2);
  document.body.addEventListener('touchmove', e=>{ if(state.playing) e.preventDefault(); }, {passive:false}); ['click','touchstart','keydown','pointerdown'].forEach(ev=>{ window.addEventListener(ev, ()=>startAudioOnGesture(), {once:true}); }); setInterval(()=>{},1000);
  window.__theSurgeon={ state, stun:()=>{ state.doctorDist += 30; }, kill:()=>triggerGameOver() };
  setInterval(()=>{ if(!state.playing) return; if(state.stamina>66 && rand() < 0.008){ blink(); } },2000);
})();
</script>
</body>
</html>
