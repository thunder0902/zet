<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Surgeon's Static — 쉬워진 프로토타입</title>
<style>
  :root{--bg:#0b0b0d;--fg:#f3f3f3;--accent:#f7c6c7;--ok:#9ee6a7}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:Inter, Noto Sans KR, system-ui}
  #game{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
  canvas{background:linear-gradient(180deg,#081016,#050508);width:100%;height:100%;display:block}
  .ui{position:fixed;left:12px;top:12px;z-index:40}
  .panel{background:rgba(0,0,0,0.5);padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.03)}
  .big{font-size:18px;font-weight:700}
  .hint{opacity:0.85;font-size:13px;margin-top:6px}
  .center-msg{position:fixed;left:50%;top:8%;transform:translateX(-50%);background:rgba(0,0,0,0.6);padding:10px 14px;border-radius:8px;z-index:41}
  .bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;z-index:41}
  .btn{background:#111;border:1px solid rgba(255,255,255,0.04);padding:8px 12px;border-radius:8px;color:var(--fg);cursor:pointer}
  .small{font-size:13px}
  @media (max-width:720px){ .panel{padding:8px} }
</style>
</head>
<body>
<div id="game">
  <canvas id="c"></canvas>
</div>
<div class="ui">
  <div class="panel">
    <div class="big">목표: 조각 5개 수집</div>
    <div class="hint">이동: W A S D 또는 화살표 • 상호작용: E • 스페이스: 깜빡임(주변 확인)</div>
    <div style="height:8px"></div>
    <div class="small">조각: <span id="shards">0</span>/5</div>
  </div>
</div>
<div id="centerMsg" class="center-msg">
  <div style="font-weight:800">외과 의사의 정적 — 튜토리얼</div>
  <div class="small" style="margin-top:6px">중앙의 빛을 향해 가면 조각을 찾습니다. 조각은 항상 시야에 표시됩니다. 연습하려면 Start 누르세요.</div>
  <div style="height:8px"></div>
  <button id="startBtn" class="btn">Start</button>
</div>
<div class="bottom" id="bottom"></div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W = innerWidth, H = innerHeight; function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; } addEventListener('resize', resize); resize();

  // Simplified top-down world
  const state = {
    playing:false, shards:0, totalShards:5,
    player:{x:0,y:0,r:12},
    shardsArr:[],
    blinkReady:true, blinkCooldown:0,
    tutorial:true
  };

  // populate shards in simple positions
  function placeShards(){ state.shardsArr = []; for(let i=0;i<state.totalShards;i++){ const angle = Math.random()*Math.PI*2; const dist = 120 + Math.random()*Math.min(W,H)/3; state.shardsArr.push({x: Math.cos(angle)*dist, y: Math.sin(angle)*dist, found:false}); } }
  placeShards();

  // center player
  state.player.x = 0; state.player.y = 0;

  // convert world->screen (player centered)
  function worldToScreen(wx,wy){ return {x: W/2 + wx, y: H/2 + wy}; }

  // input
  const keys = {}; addEventListener('keydown', e=>{ const k=e.key.toLowerCase(); keys[k]=true; if(k===' '){ e.preventDefault(); doBlink(); } if(k==='e'){ e.preventDefault(); tryCollect(); } }); addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

  // movement
  function step(dt){ const speed = 160*(dt/1000); let dx=0, dy=0; if(keys['w']||keys['arrowup']) dy-=1; if(keys['s']||keys['arrowdown']) dy+=1; if(keys['a']||keys['arrowleft']) dx-=1; if(keys['d']||keys['arrowright']) dx+=1; if(dx||dy){ const len=Math.hypot(dx,dy)||1; state.player.x += (dx/len)*speed; state.player.y += (dy/len)*speed; }
    // blink cooldown
    if(!state.blinkReady){ state.blinkCooldown -= dt/1000; if(state.blinkCooldown<=0){ state.blinkReady=true; state.blinkCooldown=0; }}
  }

  // blink reveals nearby shards briefly (visual pulse)
  let pulses = [];
  function doBlink(){ if(!state.blinkReady) return; state.blinkReady=false; state.blinkCooldown=1.2; pulses.push({t:0}); // audio cue
    // reveal: highlight shards within radius
    const R = 180; for(const s of state.shardsArr){ const dist = Math.hypot(s.x - state.player.x, s.y - state.player.y); if(dist < R && !s.found){ s.revealed = 1.0; } }
  }

  // try collect when near
  function tryCollect(){ for(const s of state.shardsArr){ if(!s.found){ const dist=Math.hypot(s.x - state.player.x, s.y - state.player.y); if(dist < 32){ s.found=true; state.shards++; document.getElementById('shards').textContent = state.shards; showToast('+1 조각'); if(state.shards >= state.totalShards){ showToast('모든 조각 획득! 탈출구가 열립니다.'); } return; } } } }

  function showToast(t){ const b = document.getElementById('bottom'); b.textContent = t; b.style.background='rgba(0,0,0,0.6)'; b.style.padding='8px 12px'; b.style.borderRadius='8px'; setTimeout(()=>{ b.textContent=''; b.style.background=''; b.style.padding=''; },1800); }

  // draw
  function draw(){ ctx.clearRect(0,0,W,H);
    // floor
    const g = ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#071017'); g.addColorStop(1,'#030303'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // draw shards (as glowing crystals)
    for(const s of state.shardsArr){ if(s.found) continue; const p = worldToScreen(s.x,s.y); // glow intensity by distance to player
      const dist = Math.hypot(s.x - state.player.x, s.y - state.player.y); const vis = clamp(1 - (dist/800),0,1) + (s.revealed||0);
      const size = 12 + vis*10;
      // beam for the first shard if tutorial
      if(state.tutorial && !s.found && s===state.shardsArr[0]){ ctx.save(); const bx=p.x, by=p.y - 40; const beamH=80; const grad = ctx.createLinearGradient(bx,by,bx,by+beamH); grad.addColorStop(0,'rgba(255,220,160,0.9)'); grad.addColorStop(1,'rgba(255,220,160,0)'); ctx.fillStyle=grad; ctx.beginPath(); ctx.moveTo(bx-10,by); ctx.lineTo(bx+10,by); ctx.lineTo(bx+60,by+beamH); ctx.lineTo(bx-60,by+beamH); ctx.closePath(); ctx.fill(); ctx.restore(); }
      ctx.save(); ctx.globalAlpha = 0.6 + 0.4*vis; ctx.fillStyle = '#cfe9ff'; ctx.beginPath(); ctx.ellipse(p.x,p.y,size,size,0,0,Math.PI*2); ctx.fill(); ctx.restore(); if(s.revealed){ s.revealed = Math.max(0, s.revealed - 0.02); }
    }

    // player
    const pp = worldToScreen(state.player.x, state.player.y);
    ctx.save(); ctx.fillStyle='#ffdcae'; ctx.beginPath(); ctx.arc(pp.x,pp.y,state.player.r,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=2; ctx.stroke(); ctx.restore();

    // HUD crosshair
    ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(W/2-12,H/2); ctx.lineTo(W/2+12,H/2); ctx.moveTo(W/2,H/2-12); ctx.lineTo(W/2,H/2+12); ctx.stroke(); ctx.restore();

    // arrows to nearest shard
    const nearest = getNearestShard(); if(nearest){ const p = worldToScreen(nearest.x,nearest.y); drawArrow(W/2,H/2,p.x,p.y); }

    // top-right blink ready
    ctx.save(); ctx.fillStyle = state.blinkReady ? 'rgba(150,220,180,0.9)' : 'rgba(120,120,120,0.6)'; ctx.fillRect(W-120,12,100,28); ctx.fillStyle='#000'; ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.fillText(state.blinkReady ? '깜빡임: 준비' : '깜빡임: 대기', W-70,32); ctx.restore();
  }

  function clamp(a,b,c){ return Math.max(b, Math.min(c, a)); }

  function drawArrow(x1,y1,x2,y2){ const angle = Math.atan2(y2-y1,x2-x1); ctx.save(); ctx.translate(x1,y1); ctx.rotate(angle); ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.beginPath(); ctx.moveTo(40,-8); ctx.lineTo(40,8); ctx.lineTo(64,0); ctx.closePath(); ctx.fill(); ctx.restore(); }

  function getNearestShard(){ let best=null,bestD=1e9; for(const s of state.shardsArr){ if(s.found) continue; const d=Math.hypot(s.x-state.player.x,s.y-state.player.y); if(d<bestD){ bestD=d; best=s; } } return best; }

  // game loop
  let last=performance.now(); function loop(t){ const dt=t-last; last=t; if(state.playing) stepAndUpdate(dt); draw(); requestAnimationFrame(loop); }
  function stepAndUpdate(dt){ step(dt); // auto collect when close
    for(const s of state.shardsArr){ if(!s.found){ const d=Math.hypot(s.x-state.player.x,s.y-state.player.y); if(d < 28){ s.found=true; state.shards++; document.getElementById('shards').textContent = state.shards; showToast('+1 조각'); if(state.shards>=state.totalShards){ showToast('모두 모았습니다! 탈출구가 열립니다.'); state.playing=false; document.getElementById('centerMsg').style.display='block'; document.getElementById('centerMsg').innerHTML='<div style="font-weight:800">축하합니다</div><div class="small">모든 조각을 모아 탈출했습니다.</div><div style="height:8px"></div><button class="btn" onclick="location.reload()">다시</button>';} } } }
    if(!state.blinkReady){ state.blinkCooldown -= dt/1000; if(state.blinkCooldown<=0) state.blinkReady=true; }
  }

  // start
  document.getElementById('startBtn').addEventListener('click', ()=>{ state.playing=true; state.tutorial=false; document.getElementById('centerMsg').style.display='none'; });

  function showToast(t){ const b=document.getElementById('bottom'); b.textContent=t; b.style.background='rgba(0,0,0,0.6)'; b.style.padding='8px 12px'; b.style.borderRadius='8px'; setTimeout(()=>{ b.textContent=''; b.style.background=''; b.style.padding=''; },1600); }

  // utility: center camera is static (player centered world coords)
  function step(dt){ const speed = 220*(dt/1000); let dx=0,dy=0; if(keys['w']||keys['arrowup']) dy-=1; if(keys['s']||keys['arrowdown']) dy+=1; if(keys['a']||keys['arrowleft']) dx-=1; if(keys['d']||keys['arrowright']) dx+=1; if(dx||dy){ const len=Math.hypot(dx,dy)||1; state.player.x += (dx/len)*speed; state.player.y += (dy/len)*speed; }
  }

  // auto place centered cluster if far
  function ensureNear(){ if(getNearestShard()){ return; } }

  // helper collect on key E
  addEventListener('keydown', e=>{ if(e.key.toLowerCase()==='e'){ tryCollect(); } if(e.key===' '){ doBlink(); } });

  // start loop
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
